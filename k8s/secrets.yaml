apiVersion: v1
kind: Secret
metadata:
  name: bot-secrets
  namespace: claude-sessions
type: Opaque
stringData:
  telegram-bot-token: "REPLACE_ME"
  encryption-key: "REPLACE_ME" # 32-byte hex string
  api-key: "" # optional — leave empty if API auth is not needed
---
apiVersion: v1
kind: Secret
metadata:
  name: claude-secrets
  namespace: claude-sessions
type: Opaque
stringData:
  anthropic-api-key: "" # optional — not needed for subscription auth
  credentials.json: "REPLACE_ME" # contents of ~/.claude/.credentials.json
  claude-config.json: "REPLACE_ME" # contents of ~/.claude.json (feature flags + trust)
