apiVersion: v1
kind: ServiceAccount
metadata:
  name: claude-bot
  namespace: claude-sessions
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: claude-bot-role
  namespace: claude-sessions
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: claude-bot-binding
  namespace: claude-sessions
subjects:
  - kind: ServiceAccount
    name: claude-bot
    namespace: claude-sessions
roleRef:
  kind: Role
  name: claude-bot-role
  apiGroup: rbac.authorization.k8s.io
