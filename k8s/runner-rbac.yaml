apiVersion: v1
kind: ServiceAccount
metadata:
  name: claude-runner
  namespace: claude-sessions
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: claude-runner-role
rules:
  # Read-only access to most resources
  - apiGroups: ["", "apps", "batch", "networking.k8s.io", "autoscaling"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  # Full access within claude-sessions namespace (managed by the bot)
  - apiGroups: ["", "apps", "batch"]
    resources: ["pods", "deployments", "services", "configmaps", "secrets", "jobs", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Logs access
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
  # Exec into pods (for debugging)
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: claude-runner-binding
subjects:
  - kind: ServiceAccount
    name: claude-runner
    namespace: claude-sessions
roleRef:
  kind: ClusterRole
  name: claude-runner-role
  apiGroup: rbac.authorization.k8s.io
