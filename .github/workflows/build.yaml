name: Build & Push Images

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./bot
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/claude-code-bot:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/claude-code-bot:${{ github.sha }}

  build-runner:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./runner
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/claude-code-runner:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/claude-code-runner:${{ github.sha }}
